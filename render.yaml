services:
  - type: web
    name: juridia-api
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      # ── Estas las configuras manualmente en el dashboard de Render ──────────
      # JWT_SECRET          → genera uno con: node -e "require('crypto').randomBytes(64).toString('hex')"
      # TURSO_DATABASE_URL  → libsql://juridia-db-haironch.aws-us-east-1.turso.io
      # TURSO_AUTH_TOKEN    → token de Turso
      # ALLOWED_ORIGINS     → https://juridia-eta.vercel.app
